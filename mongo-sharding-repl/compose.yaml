networks:
  app-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 173.17.0.0/16

volumes:
 mongo_cluster_config_srv:
 mongo_cluster_shard11_data:
 mongo_cluster_shard12_data:
 mongo_cluster_shard13_data:
 mongo_cluster_shard21_data:
 mongo_cluster_shard22_data:
